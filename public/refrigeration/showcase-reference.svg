<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title description">
  <title id="title">Reference refrigeration showcase</title>
  <description id="description">A dark two-door refrigerated showcase with four illuminated shelves.</description>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b2038"/>
      <stop offset="1" stop-color="#02070f"/>
    </linearGradient>
    <linearGradient id="frame" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#111b25"/>
      <stop offset="0.08" stop-color="#526779"/>
      <stop offset="0.5" stop-color="#182733"/>
      <stop offset="0.92" stop-color="#526779"/>
      <stop offset="1" stop-color="#111b25"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#17314a" stop-opacity="0.82"/>
      <stop offset="0.45" stop-color="#091827" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#030a12" stop-opacity="0.98"/>
    </linearGradient>
    <linearGradient id="shelf" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#60dfff" stop-opacity="0.05"/>
      <stop offset="0.5" stop-color="#b9f4ff" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#60dfff" stop-opacity="0.05"/>
    </linearGradient>
    <radialGradient id="glow">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="30" stdDeviation="30" flood-color="#000" flood-opacity="0.65"/>
    </filter>
  </defs>

  <rect width="1600" height="1000" fill="url(#background)"/>
  <ellipse cx="800" cy="420" rx="620" ry="430" fill="url(#glow)"/>

  <g filter="url(#shadow)">
    <rect x="230" y="70" width="1140" height="850" rx="30" fill="url(#frame)" stroke="#7b91a3" stroke-opacity="0.45" stroke-width="3"/>
    <rect x="270" y="110" width="500" height="750" rx="16" fill="url(#glass)" stroke="#99b2c5" stroke-opacity="0.4" stroke-width="4"/>
    <rect x="830" y="110" width="500" height="750" rx="16" fill="url(#glass)" stroke="#99b2c5" stroke-opacity="0.4" stroke-width="4"/>
    <rect x="783" y="92" width="34" height="785" rx="12" fill="#0a121b" stroke="#485b6a" stroke-opacity="0.7"/>

    <g opacity="0.9">
      <rect x="295" y="165" width="450" height="5" fill="url(#shelf)"/>
      <rect x="295" y="330" width="450" height="5" fill="url(#shelf)"/>
      <rect x="295" y="495" width="450" height="5" fill="url(#shelf)"/>
      <rect x="295" y="660" width="450" height="5" fill="url(#shelf)"/>
      <rect x="855" y="165" width="450" height="5" fill="url(#shelf)"/>
      <rect x="855" y="330" width="450" height="5" fill="url(#shelf)"/>
      <rect x="855" y="495" width="450" height="5" fill="url(#shelf)"/>
      <rect x="855" y="660" width="450" height="5" fill="url(#shelf)"/>
    </g>

    <g fill="#101b24" stroke="#4a6578" stroke-opacity="0.55">
      <rect x="315" y="190" width="115" height="110" rx="16"/><rect x="450" y="190" width="115" height="110" rx="16"/><rect x="585" y="190" width="115" height="110" rx="16"/>
      <rect x="875" y="190" width="115" height="110" rx="16"/><rect x="1010" y="190" width="115" height="110" rx="16"/><rect x="1145" y="190" width="115" height="110" rx="16"/>
      <rect x="315" y="355" width="115" height="110" rx="16"/><rect x="450" y="355" width="115" height="110" rx="16"/><rect x="585" y="355" width="115" height="110" rx="16"/>
      <rect x="875" y="355" width="115" height="110" rx="16"/><rect x="1010" y="355" width="115" height="110" rx="16"/><rect x="1145" y="355" width="115" height="110" rx="16"/>
      <rect x="315" y="520" width="115" height="110" rx="16"/><rect x="450" y="520" width="115" height="110" rx="16"/><rect x="585" y="520" width="115" height="110" rx="16"/>
      <rect x="875" y="520" width="115" height="110" rx="16"/><rect x="1010" y="520" width="115" height="110" rx="16"/><rect x="1145" y="520" width="115" height="110" rx="16"/>
      <rect x="315" y="685" width="115" height="110" rx="16"/><rect x="450" y="685" width="115" height="110" rx="16"/><rect x="585" y="685" width="115" height="110" rx="16"/>
      <rect x="875" y="685" width="115" height="110" rx="16"/><rect x="1010" y="685" width="115" height="110" rx="16"/><rect x="1145" y="685" width="115" height="110" rx="16"/>
    </g>

    <rect x="230" y="860" width="1140" height="90" rx="0 0 30 30" fill="#080f16"/>
    <rect x="1160" y="890" width="120" height="26" rx="8" fill="#03100f" stroke="#21453f"/>
    <circle cx="1190" cy="903" r="5" fill="#22c55e"/>
    <circle cx="1212" cy="903" r="5" fill="#f59e0b"/>
  </g>

  <path d="M325 115 L530 115 L360 855 L285 855 Z" fill="#fff" opacity="0.035"/>
  <path d="M885 115 L1080 115 L915 855 L845 855 Z" fill="#fff" opacity="0.03"/>
</svg>
