name: nexolab-central

x-telemetry-image: &telemetry-image
  image: ${TELEMETRY_SERVICE_IMAGE:-nexolab-telemetry-service:local}
  build:
    context: ../../services/telemetry-service

x-telemetry-environment: &telemetry-environment
  DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-nexolab}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-nexolab}
  DATABASE_CONNECT_TIMEOUT_SECONDS: ${DATABASE_CONNECT_TIMEOUT_SECONDS:-3}
  DATABASE_RETRY_INITIAL_SECONDS: ${DATABASE_RETRY_INITIAL_SECONDS:-0.25}
  DATABASE_RETRY_MAX_SECONDS: ${DATABASE_RETRY_MAX_SECONDS:-5}
  MQTT_HOST: mqtt
  MQTT_PORT: 1883
  MQTT_TOPIC: ${MQTT_TOPIC:-nexolab/telemetry}
  MQTT_CLIENT_ID: ${MQTT_CLIENT_ID:-nexolab-central-telemetry-ingestion}
  CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
  CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS:-false}
  INGESTION_QUEUE_MAXSIZE: ${INGESTION_QUEUE_MAXSIZE:-10000}
  INGESTION_PAYLOAD_MAX_BYTES: ${INGESTION_PAYLOAD_MAX_BYTES:-262144}
  DEAD_LETTER_PAYLOAD_MAX_BYTES: ${DEAD_LETTER_PAYLOAD_MAX_BYTES:-65536}
  API_MAX_PAGE_SIZE: ${API_MAX_PAGE_SIZE:-1000}
  HISTORY_MAX_RANGE_DAYS: ${HISTORY_MAX_RANGE_DAYS:-31}
  OBJECT_STORAGE_BACKEND: s3
  OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET:-nexolab-equipment-images}
  OBJECT_STORAGE_ENDPOINT_URL: http://minio:9000
  OBJECT_STORAGE_PUBLIC_ENDPOINT_URL: ${OBJECT_STORAGE_PUBLIC_ENDPOINT_URL:-http://127.0.0.1:9000}
  OBJECT_STORAGE_REGION: ${OBJECT_STORAGE_REGION:-us-east-1}
  OBJECT_STORAGE_ACCESS_KEY_ID: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
  OBJECT_STORAGE_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
  OBJECT_STORAGE_FORCE_PATH_STYLE: "true"
  EQUIPMENT_IMAGE_MAX_BYTES: ${EQUIPMENT_IMAGE_MAX_BYTES:-15728640}
  EQUIPMENT_IMAGE_SIGNED_URL_SECONDS: ${EQUIPMENT_IMAGE_SIGNED_URL_SECONDS:-900}
  WEBSOCKET_CLIENT_QUEUE_MAXSIZE: ${WEBSOCKET_CLIENT_QUEUE_MAXSIZE:-256}
  WEBSOCKET_HEARTBEAT_SECONDS: ${WEBSOCKET_HEARTBEAT_SECONDS:-20}
  WEBSOCKET_SEND_TIMEOUT_SECONDS: ${WEBSOCKET_SEND_TIMEOUT_SECONDS:-5}
  WEBSOCKET_RESUME_LIMIT: ${WEBSOCKET_RESUME_LIMIT:-1000}
  RETENTION_ENABLED: ${RETENTION_ENABLED:-true}
  TELEMETRY_RETENTION_DAYS: ${TELEMETRY_RETENTION_DAYS:-365}
  RAW_PAYLOAD_RETENTION_DAYS: ${RAW_PAYLOAD_RETENTION_DAYS:-30}
  DEAD_LETTER_RETENTION_DAYS: ${DEAD_LETTER_RETENTION_DAYS:-30}
  RETENTION_INTERVAL_SECONDS: ${RETENTION_INTERVAL_SECONDS:-3600}
  RETENTION_BATCH_SIZE: ${RETENTION_BATCH_SIZE:-1000}

services:
  mqtt:
    image: eclipse-mosquitto:2.0.22
    restart: unless-stopped
    init: true
    ports:
      - "${CENTRAL_BIND_ADDRESS:-127.0.0.1}:${CENTRAL_MQTT_PORT:-1884}:1883"
    volumes:
      - ./mosquitto.central.conf:/mosquitto/config/mosquitto.conf:ro
      - central-mqtt-data:/mosquitto/data
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -h 127.0.0.1 -t '$$SYS/broker/version' -C 1 -W 5 >/dev/null 2>&1"]
      interval: 10s
      timeout: 6s
      retries: 5
      start_period: 10s
    networks:
      - central

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    init: true
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nexolab}
      POSTGRES_USER: ${POSTGRES_USER:-nexolab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - central-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    stop_grace_period: 30s
    networks:
      - central

  minio:
    image: ${MINIO_IMAGE:-minio/minio:RELEASE.2025-09-07T16-13-09Z}
    restart: unless-stopped
    init: true
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    ports:
      - "${CENTRAL_BIND_ADDRESS:-127.0.0.1}:${CENTRAL_OBJECT_STORAGE_PORT:-9000}:9000"
      - "${CENTRAL_BIND_ADDRESS:-127.0.0.1}:${CENTRAL_OBJECT_STORAGE_CONSOLE_PORT:-9001}:9001"
    volumes:
      - central-object-storage-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    stop_grace_period: 30s
    networks:
      - central

  minio-init:
    image: ${MINIO_CLIENT_IMAGE:-minio/mc:RELEASE.2025-08-13T08-35-41Z}
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET:-nexolab-equipment-images}
    entrypoint:
      - /bin/sh
      - -ec
      - |
        mc alias set central http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"
        mc mb --ignore-existing "central/$${OBJECT_STORAGE_BUCKET}"
        mc anonymous set none "central/$${OBJECT_STORAGE_BUCKET}"
    networks:
      - central

  telemetry-migrate:
    <<: *telemetry-image
    restart: "no"
    environment: *telemetry-environment
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - central

  telemetry-service:
    <<: *telemetry-image
    restart: unless-stopped
    init: true
    environment: *telemetry-environment
    ports:
      - "${CENTRAL_BIND_ADDRESS:-127.0.0.1}:${CENTRAL_API_PORT:-8082}:8082"
    depends_on:
      mqtt:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      telemetry-migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8082/health/ready', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 9
      start_period: 15s
    stop_grace_period: 30s
    networks:
      - central

volumes:
  central-mqtt-data:
    name: nexolab-central-mqtt-data
  central-postgres-data:
    name: nexolab-central-postgres-data
  central-object-storage-data:
    name: nexolab-central-object-storage-data

networks:
  central:
    name: nexolab-central
    driver: bridge
