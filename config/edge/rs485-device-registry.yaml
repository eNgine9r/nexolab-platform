schema_version: 1

bus:
  id: rs485-main-01
  protocol: modbus-rtu
  port: /dev/serial/by-id/usb-Silicon_Labs_CP2104_USB_to_UART_Bridge_Controller_0133F090-if00-port0
  baudrate: 9600
  bytesize: 8
  parity: N
  stopbits: 1

profiles:
  - id: climate-chamber-02-dixell
    name: Кліматична камера №2
    device_type: dixell-xjp60d
    unit_ids: [101, 102, 103, 104, 105, 106, 107, 108, 109, 110, 111, 112, 113, 114]
    status: confirmed
    register_map_status: validated
    register_map: config/edge/dixell-xjp60d-v1.6-register-map.yaml
    production_driver: implemented

  - id: climate-chamber-01-dixell
    name: Кліматична камера №1
    device_type: dixell-xjp60d
    unit_ids: [126, 127, 128, 129, 130, 131, 132, 133, 134, 135, 136, 137, 138]
    status: confirmed
    register_map_status: validated
    register_map: config/edge/dixell-xjp60d-v1.6-register-map.yaml
    production_driver: implemented

  - id: energy-meters
    name: Лічильники електроенергії
    device_type: f-and-f-le-01mp
    unit_ids: [200, 201, 202, 203]
    status: confirmed
    register_map_status: validated_high_confidence_subset
    register_map: config/edge/le-01mp-register-map.yaml
    production_driver: implemented
    hardware_smoke_test:
      status: passed
      passed_unit_ids: [200, 201, 202, 203]
      pending_unit_ids: []
      validated_metrics:
        - electrical.voltage
        - electrical.current
        - electrical.frequency
        - electrical.power.active
        - electrical.power.reactive
        - electrical.power.apparent
        - electrical.power_factor
        - temperature.internal
      combined_modbus_mode: pending

  - id: unknown-unit-01
    name: Невідомий Modbus endpoint
    device_type: unknown
    unit_ids: [1]
    status: quarantined
    register_map_status: unknown
    production_driver: disabled

safety:
  read_only_profiling: true
  allowed_functions: [3, 4]
  production_hardware_mode_enabled: false
  explicit_compose_override_required: true
