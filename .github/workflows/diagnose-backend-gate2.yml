name: Diagnose backend gate 2

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/diagnose-backend-gate2.yml"
      - "services/telemetry-service/**"

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: nexolab_test
          POSTGRES_USER: nexolab
          POSTGRES_PASSWORD: nexolab-test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nexolab -d nexolab_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://nexolab:nexolab-test@localhost:5432/nexolab_test
      MQTT_ENABLED: "false"
      AUTO_CREATE_SCHEMA: "false"
    defaults:
      run:
        working-directory: services/telemetry-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install -r requirements-dev.txt
      - run: alembic upgrade head
      - name: Capture pytest output
        shell: bash
        run: |
          set +e
          python -m pytest -q > /tmp/gate2-pytest.log 2>&1
          status=$?
          echo "$status" > /tmp/gate2-pytest-status.txt
          cat /tmp/gate2-pytest.log
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: gate2-pytest-diagnostics
          path: |
            /tmp/gate2-pytest.log
            /tmp/gate2-pytest-status.txt
          if-no-files-found: error
