name: Diagnose M3 typecheck

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/diagnose-m3-typecheck.yml"
      - "src/lib/telemetry/**"

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - name: Install dependencies
        env:
          HUSKY: 0
        run: npm install --no-audit
      - name: Capture TypeScript diagnostics
        run: |
          set +e
          npm run typecheck > /tmp/m3-typecheck.log 2>&1
          status=$?
          cat /tmp/m3-typecheck.log
          echo "$status" > /tmp/m3-typecheck.status
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: m3-typecheck-diagnostics
          path: |
            /tmp/m3-typecheck.log
            /tmp/m3-typecheck.status
          if-no-files-found: error
