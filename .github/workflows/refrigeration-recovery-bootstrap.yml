name: Refrigeration recovery bootstrap

on:
  push:
    branches: [feat/refrigeration-layout-history]

permissions:
  contents: write

jobs:
  bootstrap:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feat/refrigeration-layout-history

      - name: Integrate recovery into editor
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("src/components/refrigeration/refrigeration-layout-editor.tsx")
          text = path.read_text()

          text = text.replace(
              "  Grid3X3,\n  ImageIcon,",
              "  Grid3X3,\n  History,\n  ImageIcon,",
              1,
          )

          import_anchor = '''} from "@/features/refrigeration/layout-editor";
'''
          storage_import = '''} from "@/features/refrigeration/layout-editor";
import {
  createBrowserLayoutDraftStorage,
  createLayoutDraftPayload,
  parseLayoutDraft,
  serializeLayoutDraft,
  type LayoutDraftPayload,
  type LayoutDraftStorage,
} from "@/features/refrigeration/layout-draft-storage";
'''
          if "layout-draft-storage" not in text:
              text = text.replace(import_anchor, storage_import, 1)

          state_anchor = '''  const [saveMessage, setSaveMessage] = useState<string | null>(null);
'''
          state_insert = '''  const [saveMessage, setSaveMessage] = useState<string | null>(null);
  const [recoveryDraft, setRecoveryDraft] = useState<LayoutDraftPayload | null>(null);
  const [recoveryChecked, setRecoveryChecked] = useState(false);
'''
          if "setRecoveryDraft" not in text:
              text = text.replace(state_anchor, state_insert, 1)

          refs_anchor = '''  const objectUrlsRef = useRef(new Set<string>());
'''
          refs_insert = '''  const objectUrlsRef = useRef(new Set<string>());
  const storageRef = useRef<LayoutDraftStorage | null>(null);
  const initialPlacementsRef = useRef(initialPlacements);
'''
          if "storageRef" not in text:
              text = text.replace(refs_anchor, refs_insert, 1)

          sync_effect = '''  useEffect(() => {
    draftPlacementsRef.current = draftPlacements;
  }, [draftPlacements]);

'''
          recovery_effect = '''  useEffect(() => {
    draftPlacementsRef.current = draftPlacements;
  }, [draftPlacements]);

  useEffect(() => {
    const storage = createBrowserLayoutDraftStorage(window.sessionStorage);
    storageRef.current = storage;
    const raw = storage.load(equipment.id);
    const allowedSensorIds = new Set(
      initialPlacementsRef.current.map((placement) => placement.sensorId),
    );
    const parsed = parseLayoutDraft(raw, equipment.id, allowedSensorIds);

    if (raw && !parsed) {
      storage.remove(equipment.id);
    }

    if (parsed) {
      if (placementsEqual(parsed.placements, initialPlacementsRef.current)) {
        storage.remove(equipment.id);
      } else {
        setRecoveryDraft(parsed);
      }
    }

    setRecoveryChecked(true);
  }, [equipment.id]);

'''
          if "setRecoveryChecked(true)" not in text:
              text = text.replace(sync_effect, recovery_effect, 1)

          dirty_anchor = '''  const dirty =
    !placementsEqual(draftPlacements, persistedPlacements) || !imagesEqual(draftImage, persistedImage);

'''
          autosave = '''  const dirty =
    !placementsEqual(draftPlacements, persistedPlacements) || !imagesEqual(draftImage, persistedImage);

  useEffect(() => {
    if (!recoveryChecked || recoveryDraft || mode !== "edit") return;

    if (!dirty) {
      storageRef.current?.remove(equipment.id);
      return;
    }

    storageRef.current?.save(
      equipment.id,
      serializeLayoutDraft(createLayoutDraftPayload(equipment.id, draftPlacements)),
    );
  }, [draftPlacements, dirty, equipment.id, mode, recoveryChecked, recoveryDraft]);

'''
          if "serializeLayoutDraft(createLayoutDraftPayload" not in text:
              text = text.replace(dirty_anchor, autosave, 1)

          redo_anchor = '''  const handleRedo = () => {
    const result = redo(draftPlacementsRef.current, history);
    setPlacements(result.placements);
    setHistory(result.history);
    setSaveMessage(null);
  };

'''
          redo_insert = '''  const handleRedo = () => {
    const result = redo(draftPlacementsRef.current, history);
    setPlacements(result.placements);
    setHistory(result.history);
    setSaveMessage(null);
  };

  useEffect(() => {
    if (mode !== "edit") return;

    const handleShortcut = (event: globalThis.KeyboardEvent) => {
      if (!(event.ctrlKey || event.metaKey) || event.key.toLowerCase() !== "z") return;

      event.preventDefault();
      const result = event.shiftKey
        ? redo(draftPlacementsRef.current, history)
        : undo(draftPlacementsRef.current, history);
      draftPlacementsRef.current = result.placements;
      setDraftPlacements(result.placements);
      setHistory(result.history);
      setSaveMessage(null);
    };

    window.addEventListener("keydown", handleShortcut);
    return () => window.removeEventListener("keydown", handleShortcut);
  }, [history, mode]);

  const handleRestoreRecovery = () => {
    if (!recoveryDraft) return;

    setPlacements(recoveryDraft.placements.map((placement) => ({ ...placement })));
    setHistory(emptyHistory);
    setRecoveryDraft(null);
    setSaveMessage("Відновлено незавершену чернетку");
    onModeChange("edit");
  };

  const handleDiscardRecovery = () => {
    storageRef.current?.remove(equipment.id);
    setRecoveryDraft(null);
  };

'''
          if "handleRestoreRecovery" not in text:
              text = text.replace(redo_anchor, redo_insert, 1)

          text = text.replace(
              '''  const handleCancel = () => {
    setPlacements(persistedPlacements);''',
              '''  const handleCancel = () => {
    storageRef.current?.remove(equipment.id);
    setPlacements(persistedPlacements);''',
              1,
          )
          text = text.replace(
              '''  const handleSave = () => {
    const placements = [...draftPlacementsRef.current];''',
              '''  const handleSave = () => {
    storageRef.current?.remove(equipment.id);
    const placements = [...draftPlacementsRef.current];''',
              1,
          )

          render_anchor = '''  return (
    <div id="layout-editor" className="space-y-3">
      <div className="rounded-2xl border border-white/[0.08] bg-[#08182e]/90 p-3">'''
          render_insert = '''  return (
    <div id="layout-editor" className="space-y-3">
      {recoveryDraft ? (
        <RecoveryBanner
          savedAt={recoveryDraft.savedAt}
          onRestore={handleRestoreRecovery}
          onDiscard={handleDiscardRecovery}
        />
      ) : null}
      <div className="rounded-2xl border border-white/[0.08] bg-[#08182e]/90 p-3">'''
          if "<RecoveryBanner" not in text:
              text = text.replace(render_anchor, render_insert, 1)

          toolbar_anchor = '''function ToolbarButton({
'''
          recovery_component = '''function RecoveryBanner({
  savedAt,
  onRestore,
  onDiscard,
}: {
  savedAt: string;
  onRestore: () => void;
  onDiscard: () => void;
}) {
  return (
    <section className="flex flex-col gap-3 rounded-2xl border border-cyan-400/20 bg-cyan-400/[0.06] p-4 sm:flex-row sm:items-center sm:justify-between">
      <div className="flex items-start gap-3">
        <History className="mt-0.5 h-4 w-4 text-cyan-300" />
        <div>
          <h2 className="text-sm font-semibold text-cyan-100">
            Знайдено відновлювану чернетку
          </h2>
          <p className="mt-1 text-xs text-cyan-100/60">
            Збережено {formatRecoveryTime(savedAt)}. Відновлення не змінить
            опубліковану схему.
          </p>
        </div>
      </div>
      <div className="flex gap-2">
        <button
          type="button"
          onClick={onDiscard}
          className="rounded-lg border border-white/10 px-3 py-2 text-xs text-slate-200"
        >
          Відкинути
        </button>
        <button
          type="button"
          onClick={onRestore}
          className="rounded-lg border border-cyan-300/25 bg-cyan-400/15 px-3 py-2 text-xs font-medium text-cyan-100"
        >
          Відновити
        </button>
      </div>
    </section>
  );
}

function ToolbarButton({
'''
          if "function RecoveryBanner" not in text:
              text = text.replace(toolbar_anchor, recovery_component, 1)

          if "function formatRecoveryTime" not in text:
              text += '''

function formatRecoveryTime(value: string): string {
  const date = new Date(value);
  return Number.isNaN(date.getTime())
    ? value
    : new Intl.DateTimeFormat("uk-UA", {
        dateStyle: "medium",
        timeStyle: "short",
      }).format(date);
}
'''

          path.write_text(text)
          PY

      - name: Extend component tests
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("src/components/refrigeration/refrigeration-layout-editor.test.tsx")
          text = path.read_text()
          text = text.replace(
              'import { fireEvent, render, screen } from "@testing-library/react";',
              'import { fireEvent, render, screen, waitFor } from "@testing-library/react";',
              1,
          )
          import_anchor = 'import { getRefrigerationEquipment } from "@/data/refrigeration";\n'
          storage_import = '''import { getRefrigerationEquipment } from "@/data/refrigeration";
import {
  createLayoutDraftPayload,
  layoutDraftStorageKey,
  serializeLayoutDraft,
} from "@/features/refrigeration/layout-draft-storage";
'''
          if "layoutDraftStorageKey" not in text:
              text = text.replace(import_anchor, storage_import, 1)

          text = text.replace(
              '''  beforeEach(() => {
    vi.restoreAllMocks();
  });''',
              '''  beforeEach(() => {
    vi.restoreAllMocks();
    window.sessionStorage.clear();
  });''',
              1,
          )

          tests = '''

  it("supports Ctrl/Cmd undo and redo shortcuts", () => {
    render(<EditorHarness />);

    fireEvent.click(screen.getByRole("button", { name: "Редагувати схему" }));
    const sensorMarker = marker("01F");
    const originalX = sensorMarker.getAttribute("data-x");
    fireEvent.keyDown(sensorMarker, { key: "ArrowRight" });

    fireEvent.keyDown(window, { key: "z", ctrlKey: true });
    expect(marker("01F")).toHaveAttribute("data-x", originalX);

    fireEvent.keyDown(window, { key: "z", ctrlKey: true, shiftKey: true });
    expect(marker("01F")).not.toHaveAttribute("data-x", originalX);
  });

  it("offers recovery for a valid equipment-scoped draft", async () => {
    const equipment = referenceEquipment();
    const placements = equipment.sensors.map(({ id, x, y }, index) => ({
      sensorId: id,
      x: index === 0 ? 0.75 : x,
      y: index === 0 ? 0.8 : y,
    }));
    window.sessionStorage.setItem(
      layoutDraftStorageKey(equipment.id),
      serializeLayoutDraft(
        createLayoutDraftPayload(
          equipment.id,
          placements,
          "2026-07-24T19:00:00.000Z",
        ),
      ),
    );

    render(<EditorHarness />);

    expect(
      await screen.findByText("Знайдено відновлювану чернетку"),
    ).toBeInTheDocument();
    fireEvent.click(screen.getByRole("button", { name: "Відновити" }));

    expect(screen.getByText("Режим редагування")).toBeInTheDocument();
    expect(marker("01F")).toHaveAttribute("data-x", "0.7500");
    expect(marker("01F")).toHaveAttribute("data-y", "0.8000");
  });

  it("removes invalid recovery data safely", async () => {
    const equipment = referenceEquipment();
    const key = layoutDraftStorageKey(equipment.id);
    window.sessionStorage.setItem(key, "not-json");

    render(<EditorHarness />);

    await waitFor(() => expect(window.sessionStorage.getItem(key)).toBeNull());
    expect(
      screen.queryByText("Знайдено відновлювану чернетку"),
    ).not.toBeInTheDocument();
  });
'''
          if "supports Ctrl/Cmd undo" not in text:
              text = text.rsplit("\n});", 1)[0] + tests + "\n});\n"

          path.write_text(text)
          PY

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        env:
          HUSKY: 0
        run: npm install --no-audit --no-package-lock --silent

      - name: Format repository
        run: npm run format

      - name: Commit implementation
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "feat(refrigeration): recover interrupted layout drafts"
          git push origin HEAD:feat/refrigeration-layout-history

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        env:
          NEXT_TELEMETRY_DISABLED: 1
        run: npm run build
