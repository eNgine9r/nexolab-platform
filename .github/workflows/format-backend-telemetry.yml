name: Format backend telemetry

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/format-backend-telemetry.yml"
      - ".github/workflows/telemetry-service.yml"
      - "contracts/telemetry-event.v1.schema.json"
      - "docs/architecture/adr-0001-telemetry-ingestion.md"
      - "infrastructure/compose/compose.backend.yaml"
      - "services/telemetry-service/README.md"

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - name: Install dependencies
        env:
          HUSKY: 0
        run: npm install --no-audit
      - name: Format files
        run: |
          npx prettier --write \
            .github/workflows/telemetry-service.yml \
            contracts/telemetry-event.v1.schema.json \
            docs/architecture/adr-0001-telemetry-ingestion.md \
            infrastructure/compose/compose.backend.yaml \
            services/telemetry-service/README.md
      - uses: actions/upload-artifact@v4
        with:
          name: backend-telemetry-prettier-output
          path: |
            .github/workflows/telemetry-service.yml
            contracts/telemetry-event.v1.schema.json
            docs/architecture/adr-0001-telemetry-ingestion.md
            infrastructure/compose/compose.backend.yaml
            services/telemetry-service/README.md
          if-no-files-found: error
