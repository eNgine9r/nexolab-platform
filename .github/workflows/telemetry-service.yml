name: Telemetry service

on:
  push:
    branches: [main]
    paths:
      - "services/telemetry-service/**"
      - "contracts/telemetry-event.v1.schema.json"
      - "infrastructure/compose/compose.backend.yaml"
      - "infrastructure/compose/compose.central.yaml"
      - "infrastructure/compose/compose.edge-central-bridge.yaml"
      - "infrastructure/compose/.env.central.example"
      - "infrastructure/compose/.env.edge-central.example"
      - "infrastructure/compose/mosquitto.central.conf"
      - "infrastructure/compose/central-smoke.sh"
      - "infrastructure/compose/m3-*"
      - "infrastructure/compose/m4-*"
      - "infrastructure/observability/**"
      - "docs/adr/**"
      - "docs/operations/**"
      - ".github/workflows/telemetry-service.yml"
  pull_request:
    branches: [main]
    paths:
      - "services/telemetry-service/**"
      - "contracts/telemetry-event.v1.schema.json"
      - "infrastructure/compose/compose.backend.yaml"
      - "infrastructure/compose/compose.central.yaml"
      - "infrastructure/compose/compose.edge-central-bridge.yaml"
      - "infrastructure/compose/.env.central.example"
      - "infrastructure/compose/.env.edge-central.example"
      - "infrastructure/compose/mosquitto.central.conf"
      - "infrastructure/compose/central-smoke.sh"
      - "infrastructure/compose/m3-*"
      - "infrastructure/compose/m4-*"
      - "infrastructure/observability/**"
      - "docs/adr/**"
      - "docs/operations/**"
      - ".github/workflows/telemetry-service.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: telemetry-service-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: nexolab_test
          POSTGRES_USER: nexolab
          POSTGRES_PASSWORD: nexolab-test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nexolab -d nexolab_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://nexolab:nexolab-test@localhost:5432/nexolab_test
      MQTT_ENABLED: "false"
      MQTT_E2E: "true"
      AUTO_CREATE_SCHEMA: "false"
      RETENTION_ENABLED: "false"
      OBJECT_STORAGE_E2E: "true"
      OBJECT_STORAGE_ENDPOINT_URL: http://127.0.0.1:9000
      OBJECT_STORAGE_BUCKET: nexolab-equipment-images-ci
      OBJECT_STORAGE_REGION: us-east-1
      OBJECT_STORAGE_ACCESS_KEY_ID: nexolab-storage
      OBJECT_STORAGE_SECRET_ACCESS_KEY: nexolab-storage-test-secret
    defaults:
      run:
        working-directory: services/telemetry-service

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Validate central deployment, cutover and M4 recovery contracts
        working-directory: ${{ github.workspace }}
        run: |
          bash -n infrastructure/compose/central-smoke.sh
          bash -n infrastructure/compose/m3-cutover.sh
          bash -n infrastructure/compose/m3-edge-rollback.sh
          bash -n infrastructure/compose/m3-central-stop.sh
          bash -n infrastructure/compose/m3-status.sh
          python -m py_compile infrastructure/compose/m3-validate-cutover.py
          python -m py_compile infrastructure/compose/m4-session-acceptance.py
          python infrastructure/compose/m4-session-acceptance.py --help >/dev/null
          grep -q -- '--confirm-real-hardware' infrastructure/compose/m4-session-acceptance.py
          grep -q '/dev/serial/by-id/' infrastructure/compose/m4-session-acceptance.py
          if grep -q 'docker compose down.*--volumes\|docker compose down.*-v' infrastructure/compose/m4-session-acceptance.py; then
            echo "M4 acceptance harness must not delete named volumes" >&2
            exit 1
          fi
          docker compose \
            --env-file infrastructure/compose/.env.central.example \
            -f infrastructure/compose/compose.central.yaml \
            config --quiet
          docker compose \
            --env-file infrastructure/compose/.env.edge-central.example \
            -f infrastructure/compose/compose.edge.yaml \
            -f infrastructure/compose/compose.hardware.yaml \
            -f infrastructure/compose/compose.edge-central-bridge.yaml \
            config --quiet
      - name: Start isolated Mosquitto broker
        working-directory: ${{ github.workspace }}
        run: |
          docker run --detach \
            --name nexolab-mqtt-ci \
            --publish 1883:1883 \
            --volume "${{ github.workspace }}/services/telemetry-service/tests/e2e/mosquitto-ci.conf:/mosquitto/config/mosquitto.conf:ro" \
            eclipse-mosquitto:2.0.22
          for attempt in $(seq 1 20); do
            if docker exec nexolab-mqtt-ci \
              mosquitto_sub -h 127.0.0.1 -t '$SYS/broker/version' -C 1 -W 2 \
              >/dev/null 2>&1; then
              exit 0
            fi
            sleep 1
          done
          docker logs nexolab-mqtt-ci
          exit 1
      - name: Start isolated S3-compatible object storage
        working-directory: ${{ github.workspace }}
        run: |
          docker run --detach \
            --name nexolab-minio-ci \
            --publish 9000:9000 \
            --env MINIO_ROOT_USER="$OBJECT_STORAGE_ACCESS_KEY_ID" \
            --env MINIO_ROOT_PASSWORD="$OBJECT_STORAGE_SECRET_ACCESS_KEY" \
            minio/minio:RELEASE.2025-09-07T16-13-09Z \
            server /data
          for attempt in $(seq 1 30); do
            if python - <<'PY'
          import urllib.request
          urllib.request.urlopen("http://127.0.0.1:9000/minio/health/live", timeout=2)
          PY
            then
              exit 0
            fi
            sleep 1
          done
          docker logs nexolab-minio-ci
          exit 1
      - name: Compile
        run: python -m compileall -q app tests migrations
      - name: Apply migrations to PostgreSQL
        run: alembic upgrade head
      - name: Test PostgreSQL MQTT REST WebSocket object storage dead-letter and retention
        run: python -m pytest -q -m "not database_outage"
      - name: Test PostgreSQL outage recovery
        run: |
          POSTGRES_CONTAINER_ID="$(
            docker ps \
              --filter 'ancestor=postgres:16-alpine' \
              --format '{{.ID}}' \
            | head -n 1
          )"
          test -n "$POSTGRES_CONTAINER_ID"
          POSTGRES_CONTAINER_ID="$POSTGRES_CONTAINER_ID" \
            python -m pytest -q -m database_outage
      - name: Validate offline migration SQL
        run: alembic upgrade head --sql > /tmp/telemetry-migration.sql
      - name: Build container
        working-directory: ${{ github.workspace }}
        run: docker build -t nexolab-telemetry-service:test services/telemetry-service
      - name: Stop isolated brokers and object storage
        if: always()
        working-directory: ${{ github.workspace }}
        run: |
          docker rm --force nexolab-mqtt-ci >/dev/null 2>&1 || true
          docker rm --force nexolab-minio-ci >/dev/null 2>&1 || true
