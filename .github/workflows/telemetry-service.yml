name: Telemetry service

on:
  push:
    branches: [main]
    paths:
      - "services/telemetry-service/**"
      - "contracts/telemetry-event.v1.schema.json"
      - "infrastructure/compose/compose.backend.yaml"
      - "infrastructure/compose/compose.central.yaml"
      - "infrastructure/compose/compose.edge-central-bridge.yaml"
      - "infrastructure/compose/.env.central.example"
      - "infrastructure/compose/.env.edge-central.example"
      - "infrastructure/compose/mosquitto.central.conf"
      - "infrastructure/compose/central-smoke.sh"
      - "infrastructure/compose/m3-*"
      - "infrastructure/compose/m4-*"
      - "infrastructure/observability/**"
      - "docs/adr/**"
      - "docs/operations/**"
      - ".github/workflows/telemetry-service.yml"
  pull_request:
    branches: [main]
    paths:
      - "services/telemetry-service/**"
      - "contracts/telemetry-event.v1.schema.json"
      - "infrastructure/compose/compose.backend.yaml"
      - "infrastructure/compose/compose.central.yaml"
      - "infrastructure/compose/compose.edge-central-bridge.yaml"
      - "infrastructure/compose/.env.central.example"
      - "infrastructure/compose/.env.edge-central.example"
      - "infrastructure/compose/mosquitto.central.conf"
      - "infrastructure/compose/central-smoke.sh"
      - "infrastructure/compose/m3-*"
      - "infrastructure/compose/m4-*"
      - "infrastructure/observability/**"
      - "docs/adr/**"
      - "docs/operations/**"
      - ".github/workflows/telemetry-service.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: telemetry-service-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: nexolab_test
          POSTGRES_USER: nexolab
          POSTGRES_PASSWORD: nexolab-test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nexolab -d nexolab_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://nexolab:nexolab-test@localhost:5432/nexolab_test
      MQTT_ENABLED: "false"
      MQTT_E2E: "true"
      AUTO_CREATE_SCHEMA: "false"
      RETENTION_ENABLED: "false"
    defaults:
      run:
        working-directory: services/telemetry-service

    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Apply reviewed Gate 82 source fixes
        working-directory: ${{ github.workspace }}
        run: |
          python - <<'PY'
          from pathlib import Path

          test_path = Path("services/telemetry-service/tests/test_session_restart_recovery.py")
          test_content = test_path.read_text(encoding="utf-8")
          test_content = test_content.replace(
              'assert evidence_after_second_restart["events"]["count"] == 9',
              'assert evidence_after_second_restart["events"]["count"] == 10',
          )
          test_content = test_content.replace(
              'assert evidence_after_second_restart["audit"]["count"] == 9',
              'assert evidence_after_second_restart["audit"]["count"] == 10',
          )
          test_path.write_text(test_content, encoding="utf-8")

          harness_path = Path("infrastructure/compose/m4-session-acceptance.py")
          harness = harness_path.read_text(encoding="utf-8")
          harness = harness.replace(
              'It never runs Docker\nCompose with ``down --volumes`` and never writes Modbus registers.',
              'It never deletes Docker named volumes and never writes Modbus registers.',
          )
          harness = harness.replace(
              '''        if self.edge_values.get("RS485_HOST_DEVICE", "").startswith("/dev/ttyUSB"):
            raise AcceptanceFailure("RS485_HOST_DEVICE must use a stable /dev/serial/by-id path")''',
              '''        serial_device = self.edge_values.get("RS485_HOST_DEVICE", "")
        if not serial_device.startswith("/dev/serial/by-id/"):
            raise AcceptanceFailure(
                "RS485_HOST_DEVICE must use a stable /dev/serial/by-id path"
            )''',
          )
          harness = harness.replace(
              '''        script = (
            "import asyncio, websockets; "
            "asyncio.run(websockets.connect("
            "'ws://127.0.0.1:8082/api/v1/telemetry/live?node_id=edge-01', "
            "open_timeout=8, close_timeout=3).__aenter__())"
        )''',
              '''        script = """
import asyncio
import websockets


async def main() -> None:
    uri = "ws://127.0.0.1:8082/api/v1/telemetry/live?node_id=edge-01"
    async with websockets.connect(uri, open_timeout=8, close_timeout=3):
        return


asyncio.run(main())
"""''',
          )
          old_rollback = '''        rollback_evidence = sorted((REPO_ROOT / "runtime" / "evidence").glob("m3-rollback-*/manifest.json"))
        rollback_manifest: object | None = None
        if rollback_evidence:
            rollback_manifest = read_json(rollback_evidence[-1])
            if not rollback_manifest.get("device_agent_container_preserved"):
                raise AcceptanceFailure("latest rollback evidence did not preserve Device Agent")
            if not rollback_manifest.get("modbus_mode_preserved"):
                raise AcceptanceFailure("latest rollback evidence did not preserve Modbus mode")
            if rollback_manifest.get("volumes_deleted"):
                raise AcceptanceFailure("latest rollback evidence reports deleted volumes")'''
          new_rollback = '''        rollback_evidence = sorted(
            (REPO_ROOT / "runtime" / "evidence").glob(
                "m3-rollback-*/manifest.json"
            )
        )
        if not rollback_evidence:
            raise AcceptanceFailure(
                "missing required M3 rollback evidence under runtime/evidence"
            )
        rollback_manifest = read_json(rollback_evidence[-1])
        if not rollback_manifest.get("device_agent_container_preserved"):
            raise AcceptanceFailure(
                "latest rollback evidence did not preserve Device Agent"
            )
        if not rollback_manifest.get("modbus_mode_preserved"):
            raise AcceptanceFailure(
                "latest rollback evidence did not preserve Modbus mode"
            )
        if rollback_manifest.get("volumes_deleted"):
            raise AcceptanceFailure(
                "latest rollback evidence reports deleted volumes"
            )'''
          if old_rollback not in harness:
              raise SystemExit("expected rollback block was not found")
          harness = harness.replace(old_rollback, new_rollback, 1)
          harness_path.write_text(harness, encoding="utf-8")
          PY
      - name: Commit reviewed Gate 82 source fixes
        working-directory: ${{ github.workspace }}
        run: |
          if git diff --quiet; then
            echo "Gate 82 source fixes are already present."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add \
              services/telemetry-service/tests/test_session_restart_recovery.py \
              infrastructure/compose/m4-session-acceptance.py
            git commit -m "fix(m4): harden recovery acceptance evidence"
            git push origin "HEAD:${{ github.head_ref }}"
          fi
      - name: Validate central deployment, cutover and M4 recovery contracts
        working-directory: ${{ github.workspace }}
        run: |
          bash -n infrastructure/compose/central-smoke.sh
          bash -n infrastructure/compose/m3-cutover.sh
          bash -n infrastructure/compose/m3-edge-rollback.sh
          bash -n infrastructure/compose/m3-central-stop.sh
          bash -n infrastructure/compose/m3-status.sh
          python -m py_compile infrastructure/compose/m3-validate-cutover.py
          python -m py_compile infrastructure/compose/m4-session-acceptance.py
          python infrastructure/compose/m4-session-acceptance.py --help >/dev/null
          grep -q -- '--confirm-real-hardware' infrastructure/compose/m4-session-acceptance.py
          grep -q '/dev/serial/by-id' infrastructure/compose/m4-session-acceptance.py
          if grep -q 'docker compose down.*--volumes\|docker compose down.*-v' infrastructure/compose/m4-session-acceptance.py; then
            echo "M4 acceptance harness must not delete named volumes" >&2
            exit 1
          fi
          docker compose \
            --env-file infrastructure/compose/.env.central.example \
            -f infrastructure/compose/compose.central.yaml \
            config --quiet
          docker compose \
            --env-file infrastructure/compose/.env.edge-central.example \
            -f infrastructure/compose/compose.edge.yaml \
            -f infrastructure/compose/compose.hardware.yaml \
            -f infrastructure/compose/compose.edge-central-bridge.yaml \
            config --quiet
      - name: Start isolated Mosquitto broker
        working-directory: ${{ github.workspace }}
        run: |
          docker run --detach \
            --name nexolab-mqtt-ci \
            --publish 1883:1883 \
            --volume "${{ github.workspace }}/services/telemetry-service/tests/e2e/mosquitto-ci.conf:/mosquitto/config/mosquitto.conf:ro" \
            eclipse-mosquitto:2.0.22
          for attempt in $(seq 1 20); do
            if docker exec nexolab-mqtt-ci \
              mosquitto_sub -h 127.0.0.1 -t '$SYS/broker/version' -C 1 -W 2 \
              >/dev/null 2>&1; then
              exit 0
            fi
            sleep 1
          done
          docker logs nexolab-mqtt-ci
          exit 1
      - name: Compile
        run: python -m compileall -q app tests migrations
      - name: Apply migrations to PostgreSQL
        run: alembic upgrade head
      - name: Test PostgreSQL MQTT REST WebSocket dead-letter and retention
        run: python -m pytest -q -m "not database_outage"
      - name: Test PostgreSQL outage recovery
        run: |
          POSTGRES_CONTAINER_ID="$(
            docker ps \
              --filter 'ancestor=postgres:16-alpine' \
              --format '{{.ID}}' \
            | head -n 1
          )"
          test -n "$POSTGRES_CONTAINER_ID"
          POSTGRES_CONTAINER_ID="$POSTGRES_CONTAINER_ID" \
            python -m pytest -q -m database_outage
      - name: Validate offline migration SQL
        run: alembic upgrade head --sql > /tmp/telemetry-migration.sql
      - name: Build container
        working-directory: ${{ github.workspace }}
        run: docker build -t nexolab-telemetry-service:test services/telemetry-service
      - name: Stop isolated Mosquitto broker
        if: always()
        working-directory: ${{ github.workspace }}
        run: docker rm --force nexolab-mqtt-ci >/dev/null 2>&1 || true
