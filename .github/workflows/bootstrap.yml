name: Bootstrap NEXOLAB repository

on:
  push:
    paths:
      - ".bootstrap/**"
      - ".github/workflows/bootstrap.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nexolab-bootstrap
  cancel-in-progress: false

jobs:
  bootstrap:
    name: Validate and publish clean main
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout bootstrap branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore source archive
        shell: bash
        run: |
          set -euo pipefail
          cat .bootstrap/chunk-* | base64 --decode > /tmp/nexolab.tar.xz
          mkdir -p /tmp/nexolab-source
          tar -xJf /tmp/nexolab.tar.xz -C /tmp/nexolab-source
          test -f /tmp/nexolab-source/package.json
          test -f /tmp/nexolab-source/.github/workflows/ci.yml

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: /tmp/nexolab-source/package-lock.json

      - name: Install dependencies
        working-directory: /tmp/nexolab-source
        env:
          HUSKY: 0
        run: npm ci

      - name: Validate formatting
        working-directory: /tmp/nexolab-source
        run: npm run format:check

      - name: Run ESLint
        working-directory: /tmp/nexolab-source
        run: npm run lint

      - name: Run TypeScript checks
        working-directory: /tmp/nexolab-source
        run: npm run typecheck

      - name: Run tests
        working-directory: /tmp/nexolab-source
        run: npm test

      - name: Build production application
        working-directory: /tmp/nexolab-source
        env:
          NEXT_TELEMETRY_DISABLED: 1
        run: npm run build

      - name: Publish clean main branch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan published-main
          git rm -rf .
          cp -a /tmp/nexolab-source/. .
          git add -A
          git commit -m "feat: bootstrap nexolab platform"
          git push --force origin published-main:main
