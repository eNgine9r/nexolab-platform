name: Format debug

on:
  pull_request:
    paths:
      - "config/edge/le-01mp-register-map.yaml"
      - "config/edge/rs485-device-registry.yaml"
      - "docs/rs485/le-01mp-unit-201-hardware-validation.md"
      - ".github/workflows/format-debug.yml"

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Format validation files
        run: |
          npx prettier --write \
            config/edge/le-01mp-register-map.yaml \
            config/edge/rs485-device-registry.yaml \
            docs/rs485/le-01mp-unit-201-hardware-validation.md
      - name: Upload formatted files
        uses: actions/upload-artifact@v4
        with:
          name: prettier-output
          path: |
            config/edge/le-01mp-register-map.yaml
            config/edge/rs485-device-registry.yaml
            docs/rs485/le-01mp-unit-201-hardware-validation.md
          if-no-files-found: error
