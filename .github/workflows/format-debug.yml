name: Format debug

on:
  pull_request:
    paths:
      - "config/edge/rs485-device-registry.yaml"
      - "docs/rs485/combined-modbus-hardware-validation.md"
      - "docs/rs485/combined-modbus-soak-test.md"
      - ".github/workflows/format-debug.yml"

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - name: Install dependencies
        env:
          HUSKY: 0
        run: npm install --no-audit
      - name: Format validation files
        run: |
          npx prettier --write \
            config/edge/rs485-device-registry.yaml \
            docs/rs485/combined-modbus-hardware-validation.md \
            docs/rs485/combined-modbus-soak-test.md
      - name: Upload formatted files
        uses: actions/upload-artifact@v4
        with:
          name: prettier-output
          path: |
            config/edge/rs485-device-registry.yaml
            docs/rs485/combined-modbus-hardware-validation.md
            docs/rs485/combined-modbus-soak-test.md
          if-no-files-found: error
