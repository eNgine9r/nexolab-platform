name: Format refrigeration editor

on:
  push:
    branches:
      - feat/refrigeration-layout-editor

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feat/refrigeration-layout-editor

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format changed implementation
        run: >-
          npx prettier --write
          src/components/refrigeration/refrigeration-detail-screen.tsx
          src/components/refrigeration/refrigeration-layout-editor.tsx
          src/components/refrigeration/refrigeration-layout-editor.test.tsx
          src/data/refrigeration.ts

      - name: Commit formatting
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/refrigeration src/data/refrigeration.ts
          git commit -m "style: format refrigeration layout editor"
          git push origin HEAD:feat/refrigeration-layout-editor
