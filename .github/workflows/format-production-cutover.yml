name: Format production cutover

on:
  pull_request:
    branches:
      - main
    paths:
      - "config/edge/rs485-device-registry.yaml"
      - "docs/edge-bootstrap.md"
      - "docs/rs485/combined-modbus-soak-validation.md"
      - "docs/rs485/production-modbus-cutover.md"
      - "infrastructure/compose/.env.edge.example"
      - ".github/workflows/format-production-cutover.yml"

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - name: Install dependencies
        env:
          HUSKY: 0
        run: npm install --no-audit
      - name: Format cutover files
        run: |
          npx prettier --write \
            config/edge/rs485-device-registry.yaml \
            docs/edge-bootstrap.md \
            docs/rs485/combined-modbus-soak-validation.md \
            docs/rs485/production-modbus-cutover.md \
            infrastructure/compose/.env.edge.example
      - name: Upload formatted files
        uses: actions/upload-artifact@v4
        with:
          name: production-cutover-prettier-output
          path: |
            config/edge/rs485-device-registry.yaml
            docs/edge-bootstrap.md
            docs/rs485/combined-modbus-soak-validation.md
            docs/rs485/production-modbus-cutover.md
            infrastructure/compose/.env.edge.example
          if-no-files-found: error
