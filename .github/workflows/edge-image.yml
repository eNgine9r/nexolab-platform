name: Edge image

on:
  push:
    branches: [main]
    tags: ["edge-v*"]
    paths:
      - "services/device-agent/**"
      - ".github/workflows/edge-image.yml"
  pull_request:
    branches: [main]
    paths:
      - "services/device-agent/**"
      - ".github/workflows/edge-image.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: edge-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install device-agent dependencies
        run: python -m pip install -r services/device-agent/requirements.txt

      - name: Compile device-agent
        run: python -m compileall -q services/device-agent

      - name: Test device-agent
        env:
          PYTHONPATH: services/device-agent
        run: python -m unittest discover -s services/device-agent/tests -v

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/engine9r/nexolab-device-agent
          tags: |
            type=raw,value=edge,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Build and optionally publish multi-platform image
        uses: docker/build-push-action@v6
        with:
          context: services/device-agent
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
