name: Telemetry service image

on:
  push:
    branches: [main]
    tags: ["telemetry-v*"]
    paths:
      - "services/telemetry-service/**"
      - ".github/workflows/telemetry-service-image.yml"
  pull_request:
    branches: [main]
    paths:
      - "services/telemetry-service/**"
      - ".github/workflows/telemetry-service-image.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: telemetry-service-image-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/engine9r/nexolab-telemetry-service

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=edge,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,prefix=sha-,format=long
          labels: |
            org.opencontainers.image.title=NEXOLAB Telemetry Service
            org.opencontainers.image.description=Central MQTT ingestion, PostgreSQL persistence, REST and WebSocket service
            org.opencontainers.image.vendor=NEXOLAB

      - name: Build and optionally publish multi-platform image
        uses: docker/build-push-action@v6
        with:
          context: services/telemetry-service
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify immutable published image
        if: github.event_name != 'pull_request'
        env:
          IMAGE: ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
        run: |
          docker run --rm --platform linux/amd64 "$IMAGE" \
            python -c 'from app.main import SERVICE_VERSION; print(f"service_version={SERVICE_VERSION}")'
          docker run --rm --platform linux/amd64 "$IMAGE" \
            alembic heads | grep -F '20260723_0003'
