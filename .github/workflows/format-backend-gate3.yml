name: Format backend gate 3

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/format-backend-gate3.yml"
      - ".github/workflows/telemetry-service.yml"
      - "infrastructure/compose/compose.backend.yaml"
      - "services/telemetry-service/README.md"

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - name: Install dependencies
        env:
          HUSKY: 0
        run: npm install --no-audit
      - name: Format files
        run: |
          npx prettier --write \
            .github/workflows/telemetry-service.yml \
            infrastructure/compose/compose.backend.yaml \
            services/telemetry-service/README.md
      - uses: actions/upload-artifact@v4
        with:
          name: backend-gate3-prettier-output
          path: |
            .github/workflows/telemetry-service.yml
            infrastructure/compose/compose.backend.yaml
            services/telemetry-service/README.md
          if-no-files-found: error
