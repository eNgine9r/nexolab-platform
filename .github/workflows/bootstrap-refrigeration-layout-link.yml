name: Bootstrap refrigeration layout link

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  bootstrap:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Link detail screen to editor
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("src/components/refrigeration/refrigeration-detail-screen.tsx")
          text = path.read_text()
          route = 'href={`/refrigeration/${equipment.id}/layout`}'

          if route not in text:
              title = 'title="Редактор розміщення буде додано в наступному Gate"'
              title_index = text.index(title)
              start = text.rfind("                  <button", 0, title_index)
              end = text.index("                  </button>", title_index) + len("                  </button>")
              replacement = '''                  <Link
                    href={`/refrigeration/${equipment.id}/layout`}
                    className="inline-flex items-center gap-2 rounded-xl border border-blue-400/25 bg-blue-500/15 px-3 py-2 text-xs font-medium text-blue-200 transition hover:bg-blue-500/25"
                  >
                    <Edit3 className="h-3.5 w-3.5" />
                    Редагувати схему
                  </Link>'''
              path.write_text(text[:start] + replacement + text[end:])
          PY

      - name: Install dependencies
        env:
          HUSKY: 0
        run: npm install --no-audit --no-package-lock --silent

      - name: Format changed TypeScript
        run: |
          npx prettier --write \
            src/components/refrigeration/refrigeration-detail-screen.tsx \
            src/components/refrigeration/refrigeration-layout-editor-screen.tsx \
            src/components/refrigeration/refrigeration-layout-editor-screen.test.tsx \
            src/features/refrigeration/equipment-images.ts \
            src/features/refrigeration/layout-editor.ts \
            src/features/refrigeration/layout-editor.test.ts \
            'src/app/refrigeration/[equipmentId]/layout/page.tsx'

      - name: Commit bootstrap changes
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No bootstrap changes required."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/refrigeration src/features/refrigeration 'src/app/refrigeration/[equipmentId]/layout/page.tsx'
          git commit -m "feat(refrigeration): connect and format layout editor"
          git push origin HEAD:${{ github.head_ref }}
