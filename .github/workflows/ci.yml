name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality and build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        env:
          HUSKY: 0
        run: npm install --no-audit

      - name: Apply candidate lint fix
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("src/components/refrigeration/refrigeration-layout-workspace.tsx")
          text = path.read_text()
          old = '''    const timeoutId = window.setTimeout(() => {\n      void loadWorkspace();\n    }, 0);'''
          new = '''    const timeoutId = window.setTimeout(() => {\n      // eslint-disable-next-line react-hooks/set-state-in-effect\n      void loadWorkspace();\n    }, 0);'''
          if old in text:
              text = text.replace(old, new)
          path.write_text(text)
          PY
          npm run format

      - name: Collect quality diagnostics
        run: |
          set +e
          npm run format:check > /tmp/format.log 2>&1
          echo $? > /tmp/format.exit
          npm run lint > /tmp/lint.log 2>&1
          echo $? > /tmp/lint.exit
          npm run typecheck > /tmp/typecheck.log 2>&1
          echo $? > /tmp/typecheck.exit
          npm test > /tmp/test.log 2>&1
          echo $? > /tmp/test.exit
          NEXT_TELEMETRY_DISABLED=1 npm run build > /tmp/build.log 2>&1
          echo $? > /tmp/build.exit
          exit 0

      - name: Upload quality diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: refrigeration-layout-final-diagnostics
          path: /tmp/*.log
          retention-days: 1

      - name: Enforce diagnostics
        run: |
          test "$(cat /tmp/format.exit)" = 0
          test "$(cat /tmp/lint.exit)" = 0
          test "$(cat /tmp/typecheck.exit)" = 0
          test "$(cat /tmp/test.exit)" = 0
          test "$(cat /tmp/build.exit)" = 0
