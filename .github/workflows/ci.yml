name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  diagnostics:
    name: Lint diagnostics
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout silently
        shell: bash
        run: |
          git init -q
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch -q --depth=1 origin "${GITHUB_SHA}"
          git checkout -q FETCH_HEAD

      - name: Install dependencies
        env:
          HUSKY: 0
        run: npm install --no-audit --silent

      - name: Lint
        run: npm run lint
