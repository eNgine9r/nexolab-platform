name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality and build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        env:
          HUSKY: 0
        run: npm install --no-audit

      - name: Apply final effect fixes
        run: |
          python - <<'PY'
          from pathlib import Path

          list_path = Path("src/components/sessions/sessions-list-screen.tsx")
          list_content = list_path.read_text()
          list_content = list_content.replace(
              "    void load(controller.signal);\n    return () => controller.abort();",
              "    const initialLoad = window.setTimeout(() => void load(controller.signal), 0);\n"
              "    return () => {\n"
              "      controller.abort();\n"
              "      window.clearTimeout(initialLoad);\n"
              "    };",
              1,
          )
          list_path.write_text(list_content)

          workspace_path = Path("src/components/sessions/use-session-workspace.ts")
          workspace_content = workspace_path.read_text()
          workspace_content = workspace_content.replace(
              "    void load(controller.signal);",
              "    const initialLoad = window.setTimeout(() => void load(controller.signal), 0);",
              1,
          )
          workspace_content = workspace_content.replace(
              "      controller.abort();\n      window.clearInterval(poller);",
              "      controller.abort();\n"
              "      window.clearTimeout(initialLoad);\n"
              "      window.clearInterval(poller);",
              1,
          )
          workspace_path.write_text(workspace_content)
          PY

      - name: Format latest Gate 81 fixes
        run: >-
          npm run format --
          src/components/sessions/session-wizard.tsx
          src/components/sessions/session-workspace.tsx
          src/components/sessions/sessions-list-screen.tsx
          src/components/sessions/use-session-workspace.ts
          src/lib/sessions/api-client.test.ts

      - name: Commit final source fixes
        run: |
          if git diff --quiet; then
            echo "Source tree already contains final effect fixes."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add \
              src/components/sessions/session-wizard.tsx \
              src/components/sessions/session-workspace.tsx \
              src/components/sessions/sessions-list-screen.tsx \
              src/components/sessions/use-session-workspace.ts \
              src/lib/sessions/api-client.test.ts
            git commit -m "fix(m4): schedule initial session loads"
            git push origin "HEAD:${{ github.head_ref }}"
          fi

      - name: Diagnose Gate 81 quality gates
        env:
          NEXT_TELEMETRY_DISABLED: 1
        run: |
          set +e
          LOG=/tmp/gate81-diagnostics.log
          : > "$LOG"

          echo "===== FORMAT =====" >> "$LOG"
          npm run format:check >> "$LOG" 2>&1
          FORMAT_STATUS=$?

          echo "===== LINT =====" >> "$LOG"
          npm run lint >> "$LOG" 2>&1
          LINT_STATUS=$?

          echo "===== TYPECHECK =====" >> "$LOG"
          npm run typecheck >> "$LOG" 2>&1
          TYPECHECK_STATUS=$?

          echo "===== TEST =====" >> "$LOG"
          npm test >> "$LOG" 2>&1
          TEST_STATUS=$?

          echo "===== BUILD =====" >> "$LOG"
          npm run build >> "$LOG" 2>&1
          BUILD_STATUS=$?

          echo "===== STATUS =====" >> "$LOG"
          echo "format=$FORMAT_STATUS" >> "$LOG"
          echo "lint=$LINT_STATUS" >> "$LOG"
          echo "typecheck=$TYPECHECK_STATUS" >> "$LOG"
          echo "test=$TEST_STATUS" >> "$LOG"
          echo "build=$BUILD_STATUS" >> "$LOG"

          cat "$LOG"
          test "$FORMAT_STATUS" -eq 0 \
            -a "$LINT_STATUS" -eq 0 \
            -a "$TYPECHECK_STATUS" -eq 0 \
            -a "$TEST_STATUS" -eq 0 \
            -a "$BUILD_STATUS" -eq 0

      - name: Upload Gate 81 diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate81-diagnostics-${{ github.run_id }}
          path: /tmp/gate81-diagnostics.log
          if-no-files-found: error
          retention-days: 3
