name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality and build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        env:
          HUSKY: 0
        run: npm install --no-audit

      - name: Format Gate 81 files
        run: >-
          npm run format --
          src/app/sessions
          src/components/sessions
          src/lib/sessions
          src/components/dashboard/dashboard-shell.tsx
          src/components/dashboard/sessions-panel.tsx
          src/components/dashboard/sidebar.tsx
          src/components/dashboard/topbar.tsx

      - name: Upload formatted Gate 81 files
        uses: actions/upload-artifact@v4
        with:
          name: m4-sessions-ui-formatted-${{ github.run_id }}
          path: |
            src/app/sessions
            src/components/sessions
            src/lib/sessions
            src/components/dashboard/dashboard-shell.tsx
            src/components/dashboard/sessions-panel.tsx
            src/components/dashboard/sidebar.tsx
            src/components/dashboard/topbar.tsx
          retention-days: 3

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        env:
          NEXT_TELEMETRY_DISABLED: 1
        run: npm run build
