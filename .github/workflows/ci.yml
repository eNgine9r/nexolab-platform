name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  autofix:
    name: Remove unused refrigeration import
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Remove unused import
        shell: bash
        run: |
          sed -i '/^[[:space:]]*Snowflake,$/d' src/components/refrigeration/refrigeration-detail-screen.tsx

          if git diff --quiet; then
            echo "No source change required."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/refrigeration/refrigeration-detail-screen.tsx
          git commit -m "fix(refrigeration): remove unused icon import"
          git push origin HEAD:${{ github.head_ref }}
