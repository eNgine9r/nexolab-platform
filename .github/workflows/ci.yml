name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality and build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        env:
          HUSKY: 0
        run: npm install --no-audit

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Capture test diagnostics
        run: |
          set +e
          npm test > /tmp/test.log 2>&1
          status=$?
          cat /tmp/test.log
          printf '%s\n' "$status" > /tmp/test.status
          exit 0

      - name: Upload test diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: telemetry-test-log
          path: |
            /tmp/test.log
            /tmp/test.status
          if-no-files-found: error
          retention-days: 1

      - name: Enforce test result
        run: test "$(cat /tmp/test.status)" = "0"

      - name: Build
        env:
          NEXT_TELEMETRY_DISABLED: 1
        run: npm run build
