name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality and build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        env:
          HUSKY: 0
        run: npm install --no-audit

      - name: Format refrigeration editor
        run: >-
          npx prettier --write
          src/components/refrigeration/refrigeration-detail-screen.tsx
          src/components/refrigeration/refrigeration-layout-editor.tsx
          src/components/refrigeration/refrigeration-layout-editor.test.tsx
          src/data/refrigeration.ts

      - name: Commit formatted files
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/refrigeration src/data/refrigeration.ts
          git commit -m "style: format refrigeration layout editor"
          git push origin HEAD:${{ github.head_ref }}

      - name: Upload formatted refrigeration files
        uses: actions/upload-artifact@v4
        with:
          name: formatted-refrigeration-files
          path: |
            src/components/refrigeration/refrigeration-detail-screen.tsx
            src/components/refrigeration/refrigeration-layout-editor.tsx
            src/components/refrigeration/refrigeration-layout-editor.test.tsx
            src/data/refrigeration.ts

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        env:
          NEXT_TELEMETRY_DISABLED: 1
        run: npm run build
