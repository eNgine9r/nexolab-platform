name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality and build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        env:
          HUSKY: 0
        run: npm install --no-audit

      - name: Format and commit frontend scope
        env:
          HUSKY: 0
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          npm run format
          git checkout origin/main -- .github/workflows/ci.yml
          if git diff --quiet; then
            echo "No formatting changes required"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/refrigeration-layout-frontend.md src/components/refrigeration src/features/refrigeration .github/workflows/ci.yml
          git commit -m "style: format refrigeration layout frontend"
          git push origin "HEAD:${HEAD_BRANCH}"
