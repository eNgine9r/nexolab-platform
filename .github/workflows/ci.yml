name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Restore formatted branch metadata
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Restore standard files
        run: |
          rm -f package-lock.json
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml

      - name: Commit restoration
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A package-lock.json .github/workflows/ci.yml
          git commit -m "chore: restore CI workflow and remove generated lockfile"
          git push origin HEAD:${{ github.head_ref }}
