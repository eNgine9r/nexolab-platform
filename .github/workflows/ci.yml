name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  autofix:
    name: Format refrigeration detail screen
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Install dependencies
        env:
          HUSKY: 0
        run: npm install --no-audit --no-package-lock --silent

      - name: Format detail screen
        shell: bash
        run: |
          npx prettier --write src/components/refrigeration/refrigeration-detail-screen.tsx

          if git diff --quiet -- src/components/refrigeration/refrigeration-detail-screen.tsx; then
            echo "No formatting change required."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/refrigeration/refrigeration-detail-screen.tsx
          git commit -m "style(refrigeration): format detail screen"
          git push origin HEAD:${{ github.head_ref }}
