name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality and build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        env:
          HUSKY: 0
        run: npm install --no-audit

      - name: Check formatting
        run: npm run format:check

      - name: Capture lint diagnostics
        run: |
          set +e
          npm run lint > /tmp/lint.log 2>&1
          status=$?
          cat /tmp/lint.log
          printf '%s\n' "$status" > /tmp/lint.status
          exit 0

      - name: Upload lint diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: live-dashboard-lint-log
          path: |
            /tmp/lint.log
            /tmp/lint.status
          if-no-files-found: error
          retention-days: 1

      - name: Enforce lint result
        run: test "$(cat /tmp/lint.status)" = "0"

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        env:
          NEXT_TELEMETRY_DISABLED: 1
        run: npm run build
