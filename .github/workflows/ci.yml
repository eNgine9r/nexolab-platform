name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality and build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        env:
          HUSKY: 0
        run: npm install --no-audit

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Capture typecheck diagnostics
        run: |
          set +e
          npm run typecheck > /tmp/typecheck.log 2>&1
          status=$?
          cat /tmp/typecheck.log
          printf '%s\n' "$status" > /tmp/typecheck.status
          exit 0

      - name: Upload typecheck diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: telemetry-typecheck-log
          path: |
            /tmp/typecheck.log
            /tmp/typecheck.status
          if-no-files-found: error
          retention-days: 1

      - name: Enforce typecheck result
        run: test "$(cat /tmp/typecheck.status)" = "0"

      - name: Test
        run: npm test

      - name: Build
        env:
          NEXT_TELEMETRY_DISABLED: 1
        run: npm run build
