name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality and build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        env:
          HUSKY: 0
        run: npm install --no-audit

      - name: Capture formatter patch
        run: |
          npm run format
          git diff --binary > /tmp/prettier.patch
          git checkout -- .

      - name: Upload formatter patch
        uses: actions/upload-artifact@v4
        with:
          name: telemetry-prettier-patch
          path: /tmp/prettier.patch
          if-no-files-found: error
          retention-days: 1

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        env:
          NEXT_TELEMETRY_DISABLED: 1
        run: npm run build
